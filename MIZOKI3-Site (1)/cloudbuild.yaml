# MIZOKI3 React site — Cloud Build → Cloud Run deploy pipeline.
# The Dockerfile is multi-stage; npm install + vite build happen inside
# the docker build step, so this file stays simple.
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=SHORT_SHA=$(git rev-parse --short HEAD)

steps:
  # 1. Build the container image (Node stage builds, nginx stage serves).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mizoki3-website:${SHORT_SHA}'
      - '.'

  # 2. Push to Container Registry.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/mizoki3-website:${SHORT_SHA}'

  # 3. Deploy to Cloud Run.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mizoki3-website'
      - '--image=gcr.io/$PROJECT_ID/mizoki3-website:${SHORT_SHA}'
      - '--region=us-central1'
      - '--platform=managed'
      - '--port=8080'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=10'

images:
  - 'gcr.io/$PROJECT_ID/mizoki3-website:${SHORT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
