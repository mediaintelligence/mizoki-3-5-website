<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradC6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="loopGradC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glowC6" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyanC" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrowPurpleC" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arrowGreenC" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bgGradC6)"/>
  
  <!-- Slide number -->
  <text x="80" y="80" fill="#606070" font-family="monospace" font-size="16">05</text>
  
  <!-- Title -->
  <text x="540" y="130" text-anchor="middle" fill="#f0f0f5" font-family="Georgia, serif" font-size="44">The Compounding Loop</text>
  <text x="540" y="175" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="20">Once activated, momentum builds on itself</text>
  
  <!-- Flywheel -->
  <g transform="translate(540, 550)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="280" fill="none" stroke="url(#loopGradC)" stroke-width="10" opacity="0.3" filter="url(#glowC6)"/>
    
    <!-- Main ring -->
    <circle cx="0" cy="0" r="250" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="50"/>
    
    <!-- Arrow segments -->
    <path d="M 0 -250 A 250 250 0 0 1 217 125" fill="none" stroke="#00d4ff" stroke-width="5" marker-end="url(#arrowCyanC)" filter="url(#glowC6)"/>
    <path d="M 217 125 A 250 250 0 0 1 -217 125" fill="none" stroke="#a855f7" stroke-width="5" marker-end="url(#arrowPurpleC)" filter="url(#glowC6)"/>
    <path d="M -217 125 A 250 250 0 0 1 0 -250" fill="none" stroke="#10b981" stroke-width="5" marker-end="url(#arrowGreenC)" filter="url(#glowC6)"/>
    
    <!-- Center -->
    <circle cx="0" cy="0" r="90" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="20" font-weight="600">FLYWHEEL</text>
    <text x="0" y="15" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="16">Effect</text>
    
    <!-- Node 1: Signals -->
    <g transform="translate(0, -280)">
      <rect x="-130" y="-40" width="260" height="80" rx="12" fill="rgba(0,212,255,0.2)" stroke="#00d4ff" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="18" font-weight="600">More Conversion</text>
      <text x="0" y="20" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Signals</text>
    </g>
    
    <!-- Node 2: Predictions -->
    <g transform="translate(242, 140)">
      <rect x="-130" y="-40" width="260" height="80" rx="12" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Better Predictions</text>
      <text x="0" y="20" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="16">(Higher EAR)</text>
    </g>
    
    <!-- Node 3: Delivery -->
    <g transform="translate(-242, 140)">
      <rect x="-130" y="-40" width="260" height="80" rx="12" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="18" font-weight="600">More Delivery</text>
      <text x="0" y="20" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="16">(Win Auctions)</text>
    </g>
  </g>
  
  <!-- Results -->
  <g transform="translate(140, 920)">
    <rect x="0" y="0" width="380" height="100" rx="10" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="190" y="40" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="16" font-weight="500">With the loop:</text>
    <text x="190" y="70" text-anchor="middle" fill="#f0f0f5" font-family="system-ui, sans-serif" font-size="18">Lower CPA " Better ROAS</text>
    <text x="190" y="90" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="14">Results compound</text>
  </g>
  
  <g transform="translate(560, 920)">
    <rect x="0" y="0" width="380" height="100" rx="10" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
    <text x="190" y="40" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="16" font-weight="500">Without the loop:</text>
    <text x="190" y="70" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="18">Stuck in "Learning"</text>
    <text x="190" y="90" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="14">Volatile results</text>
  </g>
  
  <!-- Key takeaway -->
  <g transform="translate(140, 1070)">
    <rect x="0" y="0" width="800" height="120" rx="12" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)" stroke-width="2"/>
    <text x="400" y="45" text-anchor="middle" fill="#f0f0f5" font-family="system-ui, sans-serif" font-size="22">Once activated, the loop compounds:</text>
    <text x="400" y="85" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="20" font-weight="500">signal ’ prediction ’ delivery ’ signal ’ ...</text>
  </g>
  
  <!-- Branding -->
  <text x="540" y="1320" text-anchor="middle" fill="#606070" font-family="monospace" font-size="14">MIZ OKI 3.5</text>
</svg>
