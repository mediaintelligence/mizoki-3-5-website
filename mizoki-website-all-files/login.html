<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — MIZ OKI 3.5</title>
  <meta name="description" content="Access the MIZ OKI 3.5 platform."/>
  <meta name="theme-color" content="#050A12"/>
  <link rel="icon" href="assets/svg/favicon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <style>
    .loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .loginCard {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, rgba(15,26,46,.85), rgba(11,18,32,.75));
      border: 1px solid rgba(25,245,255,.18);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
    }
    .loginCard h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .loginCard p {
      color: var(--muted);
      margin-bottom: 24px;
    }
    .loginForm {
      display: grid;
      gap: 16px;
    }
    .loginBtn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <a href="#content" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">Skip to content</a>
  
  <main id="content" class="loginPage">
    <div class="loginCard">
      <div class="brand" style="margin-bottom:24px;">
        <div class="mark" aria-hidden="true"></div>
        <span>
          MIZ OKI <small>3.5</small>
        </span>
      </div>
      
      <h1>Welcome back</h1>
      <p>Sign in to access the MIZ OKI 3.5 platform and Decision Control Center.</p>
      
      <form class="loginForm" action="/login" method="post">
        <div>
          <div class="label">Email address</div>
          <input class="input" type="email" name="email" placeholder="you@company.com" required/>
        </div>
        
        <div>
          <div class="label">Password</div>
          <input class="input" type="password" name="password" placeholder="••••••••" required/>
        </div>
        
        <button type="submit" class="btn primary loginBtn">Sign in</button>
      </form>
      
      <div style="margin-top:20px; text-align:center;">
        <a href="index.html" style="color:var(--muted); font-size:14px;">← Back to homepage</a>
      </div>
      
      <div style="margin-top:24px;" class="notice">
        <strong>Verifiable Autonomous Decision Intelligence</strong><br/>
        <span style="font-size:13px;">Agents propose. The Decision Control Plane authorizes.</span>
      </div>
    </div>
  </main>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
