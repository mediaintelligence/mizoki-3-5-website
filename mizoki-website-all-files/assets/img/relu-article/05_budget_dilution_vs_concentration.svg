<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <filter id="glow5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad5)"/>
  
  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#f0f0f5" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600">Budget Dilution vs. Concentration</text>
  <text x="600" y="90" text-anchor="middle" fill="#9090a0" font-family="system-ui, -apple-system, sans-serif" font-size="18">Fewer ad sets = Faster learning</text>
  
  <!-- VS divider -->
  <line x1="600" y1="130" x2="600" y2="520" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="600" cy="325" r="30" fill="#1a1a24" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <text x="600" y="332" text-anchor="middle" fill="#606070" font-family="system-ui, sans-serif" font-size="16" font-weight="600">VS</text>
  
  <!-- LEFT SIDE: Dilution (Bad) -->
  <g transform="translate(50, 130)">
    <!-- Header -->
    <rect x="0" y="0" width="500" height="50" rx="8" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1"/>
    <text x="250" y="32" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Budget Dilution</text>
    
    <!-- Budget bar (total) -->
    <rect x="50" y="80" width="400" height="30" rx="6" fill="rgba(79,143,255,0.3)" stroke="#4f8fff" stroke-width="1"/>
    <text x="250" y="100" text-anchor="middle" fill="#4f8fff" font-family="monospace" font-size="12">$500/day total budget</text>
    
    <!-- Split into many ad sets -->
    <g transform="translate(50, 130)">
      <rect x="0" y="0" width="70" height="60" rx="4" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
      <text x="35" y="25" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10">Ad Set 1</text>
      <text x="35" y="45" text-anchor="middle" fill="#9090a0" font-family="monospace" font-size="9">$50/day</text>
      
      <rect x="82" y="0" width="70" height="60" rx="4" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
      <text x="117" y="25" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10">Ad Set 2</text>
      <text x="117" y="45" text-anchor="middle" fill="#9090a0" font-family="monospace" font-size="9">$50/day</text>
      
      <rect x="164" y="0" width="70" height="60" rx="4" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
      <text x="199" y="25" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10">Ad Set 3</text>
      <text x="199" y="45" text-anchor="middle" fill="#9090a0" font-family="monospace" font-size="9">$50/day</text>
      
      <rect x="246" y="0" width="70" height="60" rx="4" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
      <text x="281" y="25" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10">Ad Set 4</text>
      <text x="281" y="45" text-anchor="middle" fill="#9090a0" font-family="monospace" font-size="9">$50/day</text>
      
      <rect x="328" y="0" width="70" height="60" rx="4" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
      <text x="363" y="25" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10">Ad Set 5</text>
      <text x="363" y="45" text-anchor="middle" fill="#9090a0" font-family="monospace" font-size="9">$50/day</text>
    </g>
    
    <!-- More ad sets indicator -->
    <text x="250" y="210" text-anchor="middle" fill="#606070" font-family="system-ui, sans-serif" font-size="12">+ 5 more ad sets...</text>
    
    <!-- Results -->
    <g transform="translate(50, 240)">
      <rect x="0" y="0" width="400" height="120" rx="8" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
      <text x="200" y="30" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Result:</text>
      <text x="200" y="55" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="13">" Each ad set: ~2-3 events/day</text>
      <text x="200" y="78" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="13">" ~15-20 events/week (below threshold)</text>
      <text x="200" y="101" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="13" font-weight="500">’ "Learning Limited" on all ad sets</text>
    </g>
  </g>
  
  <!-- RIGHT SIDE: Concentration (Good) -->
  <g transform="translate(650, 130)">
    <!-- Header -->
    <rect x="0" y="0" width="500" height="50" rx="8" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1"/>
    <text x="250" y="32" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Budget Concentration</text>
    
    <!-- Budget bar (total) -->
    <rect x="50" y="80" width="400" height="30" rx="6" fill="rgba(79,143,255,0.3)" stroke="#4f8fff" stroke-width="1"/>
    <text x="250" y="100" text-anchor="middle" fill="#4f8fff" font-family="monospace" font-size="12">$500/day total budget</text>
    
    <!-- Concentrated into fewer ad sets -->
    <g transform="translate(50, 130)">
      <rect x="25" y="0" width="150" height="70" rx="6" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="2" filter="url(#glow5)"/>
      <text x="100" y="30" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="13" font-weight="500">Ad Set 1</text>
      <text x="100" y="52" text-anchor="middle" fill="#f0f0f5" font-family="monospace" font-size="14" font-weight="600">$250/day</text>
      
      <rect x="225" y="0" width="150" height="70" rx="6" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="2" filter="url(#glow5)"/>
      <text x="300" y="30" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="13" font-weight="500">Ad Set 2</text>
      <text x="300" y="52" text-anchor="middle" fill="#f0f0f5" font-family="monospace" font-size="14" font-weight="600">$250/day</text>
    </g>
    
    <!-- Fewer ad sets indicator -->
    <text x="250" y="210" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="12">Only 2 concentrated ad sets</text>
    
    <!-- Results -->
    <g transform="translate(50, 240)">
      <rect x="0" y="0" width="400" height="120" rx="8" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
      <text x="200" y="30" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Result:</text>
      <text x="200" y="55" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="13">" Each ad set: ~12+ events/day</text>
      <text x="200" y="78" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="13">" ~84+ events/week (above threshold)</text>
      <text x="200" y="101" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="13" font-weight="500">’ Learning stabilized, compounding begins</text>
    </g>
  </g>
  
  <!-- Bottom insight -->
  <rect x="150" y="540" width="900" height="90" rx="10" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="600" y="575" text-anchor="middle" fill="#f0f0f5" font-family="system-ui, sans-serif" font-size="16" font-weight="500">The ReLU Move: Go deep before going wide</text>
  <text x="600" y="605" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="14">Consolidate budget until each ad set can generate ~50 events/week, then expand.</text>
  
  <!-- MIZ OKI branding -->
  <text x="1150" y="650" text-anchor="end" fill="#606070" font-family="monospace" font-size="12">MIZ OKI 3.5</text>
</svg>
