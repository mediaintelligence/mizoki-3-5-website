steps:
  # Step 1: Compile image inside Google Container Registry/Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/mizoki3-platform:$COMMIT_SHA', 
      '-t', 'gcr.io/$PROJECT_ID/mizoki3-platform:latest', 
      '.'
    ]

  # Step 2: Push compiled container image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mizoki3-platform:$COMMIT_SHA']

  # Step 3: Automatically deploy the pushed build directly to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mizoki3-platform'
      - '--image=gcr.io/$PROJECT_ID/mizoki3-platform:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/mizoki3-platform:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mizoki3-platform:latest'

options:
  logging: CLOUD_LOGGING_ONLY