<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MIZ OKI 3.5</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-light" style="background:var(--bg-50); height:100vh; display:flex; align-items:center; justify-content:center;">

    <div style="width:100%; max-width:440px; padding:var(--space-8);">
        
        <div style="text-align:center; margin-bottom:var(--space-8);">
            <a href="index.html" style="display:inline-flex; align-items:center; gap:8px; font-family:var(--font-display); font-size:32px; font-weight:800; color:var(--text-dark); text-decoration:none;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M9 13a4.5 4.5 0 0 0 3-4"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M6 18a4 4 0 0 1-1.968-.516"/><path d="M10.996 14.828A4 4 0 0 0 12 14.5"/></svg>
                MIZ<span style="color:var(--accent);">OKI</span>
            </a>
            <h2 style="margin-top:var(--space-6); font-size:24px; color:var(--text-dark);">Sign in to your instance</h2>
            <p style="color:var(--text-600); margin-top:var(--space-2);">Enterprise authentication required</p>
        </div>

        <div class="card" style="background:white; border:1px solid #e2e8f0; border-radius:16px; padding:32px; box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.1);">
            <form onsubmit="event.preventDefault();">
                <div style="margin-bottom:24px;">
                    <input type="email" placeholder="Corporate Email Address" required style="width:100%; padding:12px 16px; border:1px solid #cbd5e1; border-radius:8px; font-size:16px; outline:none;" />
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; border-radius:8px; font-size:16px;">Continue with Email</button>
            </form>

            <div style="margin:24px 0; display:flex; align-items:center;">
                <div style="flex:1; border-top:1px solid #e2e8f0;"></div>
                <div style="padding:0 16px; color:var(--text-500); font-size:14px;">Or continue with</div>
                <div style="flex:1; border-top:1px solid #e2e8f0;"></div>
            </div>

            <div style="display:flex; gap:12px;">
                <button class="btn btn-secondary" style="flex:1; padding:10px; border-radius:8px; background:white;">Microsoft</button>
                <button class="btn btn-secondary" style="flex:1; padding:10px; border-radius:8px; background:white;">Okta</button>
            </div>
        </div>

    </div>

</body>
</html>
