# MIZOKI3 React app — nginx server block (Cloud Run port 8080).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let the React app handle in-app routing/anchors.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Standalone static console (lives in public/console/, copied verbatim
    # into the bundle by Vite). Must NOT fall back to index.html.
    location /console/ {
        try_files $uri $uri/ =404;
    }

    # Long cache for Vite-hashed build assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Basic hardening headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
