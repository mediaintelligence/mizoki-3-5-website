<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="cyanGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#4f8fff"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad2)"/>
  
  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#f0f0f5" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600">Nonlinear Activation Curve</text>
  <text x="600" y="90" text-anchor="middle" fill="#9090a0" font-family="system-ui, -apple-system, sans-serif" font-size="18">Results jump once you cross the learning threshold</text>
  
  <!-- Graph area -->
  <g transform="translate(150, 130)">
    <!-- Grid -->
    <g stroke="#2a2a35" stroke-width="1">
      <line x1="100" y1="0" x2="100" y2="400"/>
      <line x1="200" y1="0" x2="200" y2="400"/>
      <line x1="300" y1="0" x2="300" y2="400"/>
      <line x1="400" y1="0" x2="400" y2="400"/>
      <line x1="500" y1="0" x2="500" y2="400"/>
      <line x1="600" y1="0" x2="600" y2="400"/>
      <line x1="700" y1="0" x2="700" y2="400"/>
      <line x1="800" y1="0" x2="800" y2="400"/>
      <line x1="0" y1="80" x2="900" y2="80"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="0" y1="320" x2="900" y2="320"/>
    </g>
    
    <!-- Axes -->
    <line x1="0" y1="400" x2="900" y2="400" stroke="#606070" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="400" stroke="#606070" stroke-width="2"/>
    
    <!-- Axis labels -->
    <text x="450" y="460" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="14">Signal Strength (Optimization Events)</text>
    <text x="-200" y="-30" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="14" transform="rotate(-90)">Performance / Delivery</text>
    
    <!-- Threshold zone -->
    <rect x="280" y="0" width="120" height="400" fill="rgba(168,85,247,0.1)"/>
    <line x1="340" y1="0" x2="340" y2="400" stroke="#a855f7" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="340" y="-15" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="12">~50 EVENTS</text>
    
    <!-- Flat zone (below threshold) -->
    <path d="M 0 380 Q 100 378 200 375 Q 280 370 340 350" 
          fill="none" stroke="#ef4444" stroke-width="4" opacity="0.6"/>
    
    <!-- Activation zone (above threshold) - the jump -->
    <path d="M 340 350 Q 360 300 400 200 Q 500 80 600 60 Q 700 50 800 45 L 900 45" 
          fill="none" stroke="url(#cyanGrad2)" stroke-width="4" filter="url(#glow2)"/>
    
    <!-- Annotations -->
    <!-- Flat zone annotation -->
    <g transform="translate(120, 340)">
      <rect x="-80" y="-20" width="160" height="40" rx="6" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="12" font-weight="500">"Learning Limited"</text>
    </g>
    
    <!-- Jump annotation -->
    <g transform="translate(400, 150)">
      <path d="M 0 80 C 20 40 30 20 50 0" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
      <polygon points="45,-8 55,5 40,5" fill="#f59e0b"/>
      <rect x="60" y="-25" width="100" height="50" rx="6" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
      <text x="110" y="-3" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="11" font-weight="500">The "Jump"</text>
      <text x="110" y="13" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="10">Non-linear</text>
    </g>
    
    <!-- Momentum zone annotation -->
    <g transform="translate(650, 80)">
      <rect x="-70" y="-30" width="140" height="50" rx="6" fill="rgba(0,212,255,0.2)" stroke="#00d4ff" stroke-width="1"/>
      <text x="0" y="-8" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Momentum Zone</text>
      <text x="0" y="10" text-anchor="middle" fill="#9090a0" font-family="system-ui, sans-serif" font-size="11">Learning stabilized</text>
    </g>
    
    <!-- X-axis markers -->
    <text x="0" y="425" text-anchor="middle" fill="#606070" font-family="monospace" font-size="11">0</text>
    <text x="170" y="425" text-anchor="middle" fill="#606070" font-family="monospace" font-size="11">25</text>
    <text x="340" y="425" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="11" font-weight="600">50</text>
    <text x="510" y="425" text-anchor="middle" fill="#606070" font-family="monospace" font-size="11">75</text>
    <text x="680" y="425" text-anchor="middle" fill="#606070" font-family="monospace" font-size="11">100</text>
    <text x="850" y="425" text-anchor="middle" fill="#606070" font-family="monospace" font-size="11">125+</text>
  </g>
  
  <!-- Bottom insight -->
  <rect x="250" y="580" width="700" height="60" rx="10" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="600" y="618" text-anchor="middle" fill="#f0f0f5" font-family="system-ui, sans-serif" font-size="16">It's not linear  performance often <tspan fill="#a855f7">jumps</tspan> once you cross ~50 events/week</text>
  
  <!-- MIZ OKI branding -->
  <text x="1150" y="650" text-anchor="end" fill="#606070" font-family="monospace" font-size="12">MIZ OKI 3.5</text>
</svg>
